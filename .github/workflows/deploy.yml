name: Deploy to Cloud Run

# 合併進 main 才部署(對齊「測試過 → 併 main → 上線」流程)。
on:
  push:
    branches: [main]

env:
  REGION: asia-east1        # 台灣;要改地區改這裡
  SERVICE: ask-shane        # Cloud Run 服務名

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write        # Workload Identity Federation 需要(免存長期金鑰)
    steps:
      - uses: actions/checkout@v4

      # 用 WIF 換取 GCP 短期憑證(設定見 DEPLOY.md)
      - id: auth
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WIF_PROVIDER }}
          service_account: ${{ secrets.GCP_SA_EMAIL }}

      - uses: google-github-actions/setup-gcloud@v2

      # --source . 讓 Cloud Build 直接用 Dockerfile 建置並部署(免手動 build/push)。
      # GEMINI_API_KEY 走 Secret Manager;SHOW_SOURCES=false 為對外模式。
      - name: Deploy
        run: |
          gcloud run deploy "$SERVICE" \
            --source . \
            --project "${{ secrets.GCP_PROJECT_ID }}" \
            --region "$REGION" \
            --allow-unauthenticated \
            --memory 2Gi \
            --cpu 1 \
            --timeout 600 \
            --set-secrets GEMINI_API_KEY=GEMINI_API_KEY:latest \
            --set-env-vars SHOW_SOURCES=false,GEMINI_MODEL=gemini-2.5-flash
